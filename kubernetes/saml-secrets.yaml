# SAML Secrets for jobe-web
# 
# This is a TEMPLATE. Replace the base64-encoded values below with your actual
# SP certificate, private key, and session secret before applying.
#
# To generate the SP certificate and key, run:
#   scripts/generate-sp-certs.sh
#
# To encode values for the Secret:
#   cat sp.crt | base64 -w 0
#   cat sp.key | base64 -w 0
#   echo -n "your-random-session-secret" | base64 -w 0
#
apiVersion: v1
kind: Secret
metadata:
  name: saml-creds
  namespace: jobe-web
type: Opaque
data:
  sp.crt: <BASE64_ENCODED_SP_CERTIFICATE>
  sp.key: <BASE64_ENCODED_SP_PRIVATE_KEY>
  session-secret: <BASE64_ENCODED_SESSION_SECRET>
