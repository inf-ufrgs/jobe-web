<!DOCTYPE html>
<html lang="en">
<head>
    <title>Moodle Import: {{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">
    <div class="alert alert-info shadow-sm d-flex justify-content-between align-items-center">
        <div>
            <small class="text-uppercase fw-bold">Grading Context</small>
            <h5 class="mb-0">{{ title }}</h5>
        </div>
        <a href="/professor/{{ assignment_id }}" class="btn btn-outline-secondary btn-sm">← Back</a>
    </div>

    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">🔗 Connect to Moodle</h5>
        </div>
        <div class="card-body">
            <form action="/professor/moodle/assignments" method="post">
                
                <input type="hidden" name="assignment_id" value="{{ assignment_id }}">
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Matrícula:</label>
                    <input type="text" name="prof_id" class="form-control" placeholder="00123456" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Moodle Token:</label>
                    <input type="password" name="moodle_token" class="form-control" 
                           placeholder="Your Moodle web-service token" required>
                    <div class="form-text">
                        Your token is used only for this request and is <strong>never stored</strong>.
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Course ID:</label>
                    <input type="number" name="course_id" class="form-control" 
                           placeholder="e.g. 12345" required>
                    <div class="form-text">
                        The numeric ID from your Moodle course URL.
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">
                        🔍 List Assignments
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
