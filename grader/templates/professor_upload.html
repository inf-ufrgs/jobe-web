<!DOCTYPE html>
<html lang="en">
<head>
    <title>Grade: {{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">
    <div class="alert alert-info shadow-sm d-flex justify-content-between align-items-center">
        <div>
            <small class="text-uppercase fw-bold">Grading Context</small>
            <h5 class="mb-0">{{ title }}</h5>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">👨‍🏫 Upload Moodle Submissions</h5>
        </div>
        <div class="card-body">
            <form action="/professor/grade" method="post" enctype="multipart/form-data">
                
                <input type="hidden" name="assignment_id" value="{{ assignment_id }}">
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Matrícula:</label>
                    <input type="input" name="prof_id" class="form-control" placeholder="00123456" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Submissions Zip:</label>
                    <input type="file" name="zip_file" class="form-control" accept=".zip" required>
                    <div class="form-text">
                        Upload the file downloaded from Moodle ("Download all submissions").
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">
                        🚀 Unzip & Auto-Grade
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
