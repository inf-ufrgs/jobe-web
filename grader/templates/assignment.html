<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .lab-container {
            max-width: 1200px;
            margin: 40px auto;
        }

        /* Make the code editor look like code */
        textarea.code-editor {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
        }

        /* Make tables inside markdown look good automatically */
        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
            color: #212529;
        }

        .markdown-content th,
        .markdown-content td {
            padding: 0.75rem;
            vertical-align: top;
            border-top: 1px solid #dee2e6;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
            font-size: 0.9em;
        }

        .markdown-content th {
            vertical-align: bottom;
            border-bottom: 2px solid #dee2e6;
            font-weight: bold;
            text-align: left;
            /* Align header text left */
        }

        /* Optional: Stripes for better readability */
        .markdown-content tbody tr:nth-of-type(odd) {
            background-color: rgba(0, 0, 0, 0.05);
        }
    </style>
    <script>
        window.MathJax = {
            tex: {
                //inlineMath: [['$', '$'], ['\\(', '\\)']], -- Original delimiters that caused issues with Markdown dollar signs
                inlineMath: [['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                ignoreHtmlClass: 'tex2jax_ignore',
                processHtmlClass: 'tex2jax_process'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>

<body>

    <div class="container lab-container">

        <div class="card shadow-sm mb-4">
            <div
                class="card-header bg-dark text-white p-3 d-flex flex-wrap align-items-center justify-content-between gap-2">
                <h4 class="mb-0 me-auto">{{ title }}</h4>
                <div class="d-flex flex-wrap gap-2">
                    <span class="badge bg-info text-dark d-flex align-items-center">Time Limit: {{ time_limit }}s</span>
                    <span class="badge bg-info text-dark d-flex align-items-center">Memory Limit: {{ memory_limit
                        }}MB</span>
                    <span class="badge bg-info text-dark d-flex align-items-center">Author: {{ author }}</span>
                    {% if last_updated %}
                    <span class="badge bg-info text-dark d-flex align-items-center">Atualizado em: {{ last_updated
                        }}</span>
                    {% endif %}
                </div>
            </div>
            <div class="card-body markdown-content">
                {{ description_html | safe }}
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">🐍 Cole seu Código</h5>
            </div>
            <div class="card-body">
                <form action="/submit" method="post">

                    <input type="hidden" name="assignment_id" value="{{ assignment_id }}">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Matrícula:</label>
                        <input type="text" name="student_id" class="form-control" placeholder="00123456" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Código Python:</label>
                        <textarea name="code" class="form-control code-editor" rows="10" spellcheck="false"
                            placeholder="a = int(input('Value A: '))&#10;b = int(input('Value B: '))&#10;print(a + b)"
                            required></textarea>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg">Executar Testes</button>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
</body>

</html>
